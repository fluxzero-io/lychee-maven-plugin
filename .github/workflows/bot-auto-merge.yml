name: Bot Auto Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-automerge:
    if: github.actor == 'dependabot[bot]' || github.actor == 'release-please[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Enable PR auto-merge (squash)
        id: enable_automerge
        continue-on-error: true
        uses: peter-evans/enable-pull-request-automerge@a660677d5469627102a1c1e11409dd063606628d # v3
        with:
          pull-request-number: ${{ github.event.pull_request.number }}
          merge-method: squash

      - name: Auto-merge not enabled
        if: steps.enable_automerge.outcome == 'failure'
        run: echo "Could not enable auto-merge in this workflow context; leaving PR for manual merge."
